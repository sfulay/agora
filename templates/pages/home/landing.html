{% load static %}

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <meta name="description" content="" />
    <title>Agora</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'gabm/sneat/assets/img/favicon/favicon.ico' %}" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet" />

    <!-- Core CSS -->
    <link rel="stylesheet" href="{% static 'gabm/sneat/assets/vendor/css/rtl/core.css' %}" />
    <link rel="stylesheet" href="{% static 'gabm/sneat/assets/vendor/css/rtl/theme-default.css' %}" />

    <style>
      .light-style body,
      .dark-style body,
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background-color: transparent !important;
        background-image: url("{% static 'gabm/img/agora.png' %}") !important;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
      }

      #landing_wrapper {
        padding: 0;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      /* Logo in top left */
      #top_nav {
        position: absolute;
        top: 2em;
        left: 2em;
        z-index: 10;
      }

      #logo {
        color: #F77F00;
        font-size: 1.5em;
      }

      /* Centered button container */
      #button_container {
        display: flex;
        gap: 1.5em;
        align-items: center;
        justify-content: center;
        z-index: 5;
      }

      #button_container .btn {
        width: 10em;
        height: 3em;
        font-size: 1.1em;
        font-weight: 600;
      }

      /* Contact footer */
      #contact_footer {
        position: absolute;
        bottom: 2em;
        width: 100%;
        text-align: center;
        z-index: 10;
      }

      #contact_footer a {
        color: #697A8D;
        text-decoration: none;
      }

    </style>

    <style>
      @media screen and (max-width: 768px) {
        #button_container {
          flex-direction: column;
          gap: 1em;
        }

        #button_container .btn {
          width: 12em;
        }
      }
    </style>
  </head>
  <body>
    <div id="landing_wrapper">
      <!-- Logo in top left -->
      <nav id="top_nav">
        <a href="{% url 'home' %}" class="app-brand-link">
          <span id="logo" class="app-brand-text demo menu-text fw-bold ms-2 ps-1">Agora</span>
        </a>
      </nav>

      <!-- Centered buttons -->
      <div id="button_container">
        <a href="{% url 'account_login' %}" class="btn btn-outline-primary">Log in</a>
        <a href="{% url 'account_signup' %}" class="btn btn-primary">Sign up</a>
      </div>

      <!-- Contact footer -->
      <div id="contact_footer">
        <p><a href="mailto:sfulay@mit.edu">Contact us</a></p>
      </div>
    </div>
  </body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agora</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-image: url("{% static 'gabm/img/agora_building.png' %}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sign-out-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      background-color: rgba(0, 0, 0, 0.9);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .sign-out-btn:hover {
      background-color: rgba(0, 0, 0, 1);
    }

    .center-button {
      padding: 20px 40px;
      background-color: rgba(0, 0, 0, 0.95);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 24px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background-color 0.3s, transform 0.2s;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .center-button:hover {
      background-color: rgba(0, 0, 0, 1);
      transform: translateY(-2px);
      box-shadow: 0 6px 8px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>
  <!-- Sign Out Button -->
  {% if request.user.is_authenticated %}
    <form method="post" action="{% url 'account_logout' %}" style="display: inline;">
      {% csrf_token %}
      <button type="submit" class="sign-out-btn">Sign Out</button>
    </form>
  {% endif %}

  <!-- Center Button -->
  {% if settings.DATA_TYPE == "cortico" %}
    <a href="{% url 'recommendation_editor' 57 %}" class="center-button">Enter the Agora</a>
  {% else %}
    <a href="{% url 'recommendation_editor' 273 %}" class="center-button">Enter the Agora</a>
  {% endif %}
</body>
</html>
